apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-common-policy
spec:
  validationFailureAction: Audit   # or Enforce
  background: true
  rules:
    - name: require-resource-limits
      match:
        resources:
          kinds:
            - Pod
      exclude:
        resources:
          namespaces:
            - kube-system
            - kyverno
            - gatekeeper-system
      validate:
        message: "Resource limits are required."
        pattern:
          spec:
            containers:
            - resources:
                limits:
                  memory: "?*"
                  cpu: "?*"
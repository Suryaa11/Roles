apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: surya-rolebinding
  namespace: fitness-ns
subjects:
  - kind: User
    name: raj
    apiGroup: rbac.authorization.k8s.io
  - kind: ServiceAccount
    name: svc-account
    namespace: fitness-ns
roleRef:
  kind: Role
  name: surya-role
  apiGroup: rbac.authorization.k8s.io